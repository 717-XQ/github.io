<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>依陪护 · 我的订单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fc; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .card-shadow { box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 20, 50, 0.03); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 0 20px; box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.02); z-index: 40;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #9ca3af; text-decoration: none; transition: color 0.2s;
        }
        .nav-item.active { color: #2563eb; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 2px; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }
        .order-tab {
            padding: 8px 0; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent;
            cursor: pointer; transition: all 0.2s;
        }
        .order-tab.active {
            color: #2563eb; border-bottom: 2px solid #2563eb;
        }
    </style>
</head>
<body class="antialiased text-gray-800">

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 md:py-6">
    <!-- 头部 -->
    <div class="flex items-center mb-4">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-sm mr-3">
            <i class="fas fa-clipboard-list text-white text-xl"></i>
        </div>
        <span class="text-2xl font-bold text-gray-800">我的订单</span>
        <span class="ml-auto text-sm bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full"><i class="far fa-bell mr-1"></i>3条动态</span>
    </div>

    <!-- 订单状态切换卡 -->
    <div class="flex gap-6 border-b border-gray-200 mb-4">
        <div class="order-tab active" onclick="switchOrderTab('all')">全部</div>
        <div class="order-tab" onclick="switchOrderTab('ongoing')">进行中</div>
        <div class="order-tab" onclick="switchOrderTab('completed')">已完成</div>
    </div>

    <!-- 订单列表 (AI生成模拟数据) -->
    <div id="ordersContainer" class="space-y-3">
        <!-- 订单卡片将通过JS动态渲染，但也可静态编写示例，此处用JS动态生成以展示AI数据 -->
    </div>
</div>

<!-- 底部导航栏 -->
<div class="bottom-nav">
    <a href="index.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>首页</span>
    </a>
    <a href="services.html" class="nav-item">
        <i class="fas fa-concierge-bell"></i>
        <span>服务</span>
    </a>
    <a href="orders.html" class="nav-item active">
        <i class="fas fa-clipboard-list"></i>
        <span>订单</span>
    </a>
</div>

<script>
    // AI生成的订单数据
    const mockOrders = [
        {
            id: 'ORD-20250321-001',
            serviceName: '全程陪诊·基础版',
            hospital: '市人民医院',
            date: '2025-03-22 09:00',
            status: 'ongoing', // 'ongoing', 'completed', 'cancelled'
            statusText: '待服务',
            statusColor: 'text-amber-600 bg-amber-50',
            companion: '王丽华',
            price: 298
        },
        {
            id: 'ORD-20250320-045',
            serviceName: '检查专项陪同',
            hospital: '华山医院',
            date: '2025-03-21 14:30',
            status: 'completed',
            statusText: '已完成',
            statusColor: 'text-green-600 bg-green-50',
            companion: '陈国栋',
            price: 398
        },
        {
            id: 'ORD-20250319-112',
            serviceName: '代办问诊·代配药',
            hospital: '仁济医院',
            date: '2025-03-20 10:15',
            status: 'completed',
            statusText: '已完成',
            statusColor: 'text-green-600 bg-green-50',
            companion: '李素芬',
            price: 198
        },
        {
            id: 'ORD-20250322-078',
            serviceName: '住院陪护·全日',
            hospital: '长海医院',
            date: '2025-03-23 08:00 (开始)',
            status: 'ongoing',
            statusText: '待开始',
            statusColor: 'text-blue-600 bg-blue-50',
            companion: '张志强',
            price: 480
        },
        {
            id: 'ORD-20250318-033',
            serviceName: '认知症专项陪护',
            hospital: '瑞金医院',
            date: '2025-03-19 13:00',
            status: 'completed',
            statusText: '已完成',
            statusColor: 'text-green-600 bg-green-50',
            companion: '赵敏慧',
            price: 350
        }
    ];

    let currentTab = 'all';

    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        if (!container) return;
        const filtered = mockOrders.filter(order => {
            if (currentTab === 'all') return true;
            return order.status === currentTab;
        });
        let html = '';
        filtered.forEach(order => {
            html += `
                <div class="bg-white rounded-2xl p-4 card-shadow border border-gray-100">
                    <div class="flex items-start justify-between">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800">${order.serviceName}</span>
                                <span class="text-xs px-2 py-0.5 rounded-full ${order.statusColor}">${order.statusText}</span>
                            </div>
                            <p class="text-sm text-gray-500 mt-1"><i class="fas fa-hospital mr-1"></i>${order.hospital}</p>
                        </div>
                        <span class="text-blue-600 font-semibold">¥${order.price}</span>
                    </div>
                    <div class="flex items-center gap-4 mt-3 text-sm text-gray-600">
                        <span><i class="far fa-calendar mr-1"></i>${order.date}</span>
                        <span><i class="fas fa-user-md mr-1"></i>陪诊师：${order.companion}</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button class="flex-1 bg-blue-50 text-blue-700 py-2 rounded-lg text-sm font-medium hover:bg-blue-100 transition">
                            <i class="fas fa-comment-dots mr-1"></i>联系陪诊师
                        </button>
                        ${order.status === 'ongoing' ?
                '<button class="flex-1 bg-white border border-gray-200 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50"><i class="fas fa-times-circle mr-1"></i>取消订单</button>' :
                '<button class="flex-1 bg-white border border-gray-200 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50"><i class="fas fa-redo-alt mr-1"></i>再次预约</button>'
            }
                    </div>
                </div>
            `;
        });
        if (filtered.length === 0) {
            html = `<div class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-4xl mb-3"></i><p>暂无此类订单</p></div>`;
        }
        container.innerHTML = html;
    }

    function switchOrderTab(tab) {
        currentTab = tab;
        // 更新Tab样式
        const tabs = document.querySelectorAll('.order-tab');
        tabs.forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderOrders();
    }

    window.onload = function() {
        renderOrders();
        window.switchOrderTab = switchOrderTab;
    };
</script>
</body>
</html>
